<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRAFT·Vibe — Intro Video</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@500&family=Noto+Sans+Tamil:wght@500;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#100d09;overflow:hidden;font-family:'DM Sans',sans-serif}
  /* 9:16 friendly but fills screen; promo stage */
  .stage{position:fixed;inset:0;background:#1c1813;color:#f1e6d0;overflow:hidden}
  .scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7vw;opacity:0;visibility:hidden;transition:opacity .7s ease,visibility .7s}
  .scene.on{opacity:1;visibility:visible}
  .bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transform:scale(1.02);transition:opacity 1s ease}
  .scene.on .bg{opacity:.42;transform:scale(1.16);transition:opacity 1s ease, transform 7s ease}
  .scene::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(28,24,19,.35),rgba(16,13,9,.9))}
  .inner{position:relative;z-index:2;max-width:1000px}
  .eyebrow{font-family:'DM Mono',monospace;font-size:clamp(11px,2.4vw,15px);letter-spacing:4px;text-transform:uppercase;color:#d9b88a;opacity:0;transform:translateY(18px);transition:.6s .15s}
  .en{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:clamp(34px,8vw,86px);line-height:1.02;letter-spacing:1px;margin:14px 0 4px;color:#f4ead7;opacity:0;transform:translateY(28px);transition:.7s .3s}
  .en .r{color:#e7564a}.en .g{color:#7fae84}
  .sub{font-size:clamp(15px,3.2vw,24px);color:#e9d9bd;opacity:0;transform:translateY(22px);transition:.7s .45s;max-width:24ch;margin:0 auto}
  .ta{font-family:'Noto Sans Tamil',sans-serif;font-weight:700;font-size:clamp(18px,4.4vw,40px);line-height:1.3;margin-top:16px;color:#f1c9a0;opacity:0;transform:translateY(22px);transition:.7s .6s}
  .ta.sub2{font-size:clamp(14px,3vw,24px);color:#d9b88a;font-weight:500;margin-top:6px}
  .scene.on .eyebrow,.scene.on .en,.scene.on .sub,.scene.on .ta{opacity:1;transform:none}

  /* logo scene */
  .logo-wrap{display:flex;flex-direction:column;align-items:center;gap:18px}
  .logo-wrap svg{width:clamp(120px,26vw,230px);height:auto;opacity:0;transform:scale(.6) rotate(-8deg);transition:1s cubic-bezier(.2,.8,.2,1)}
  .scene.on .logo-wrap svg{opacity:1;transform:none}
  .wm{font-family:'Anton',sans-serif;text-transform:uppercase;font-size:clamp(40px,11vw,108px);letter-spacing:2px;color:#f4ead7;opacity:0;transform:translateY(26px);transition:.8s .5s}
  .scene.on .wm{opacity:1;transform:none}
  .wm .r{color:#e7564a}

  /* CTA scene */
  .cta-num{font-family:'Anton',sans-serif;font-size:clamp(30px,7vw,64px);color:#7fae84;letter-spacing:1px;margin-top:10px}
  .cta-pill{display:inline-flex;align-items:center;gap:10px;background:#2c4d34;color:#fff;font-weight:700;font-size:clamp(15px,3.4vw,22px);padding:12px 22px;border-radius:40px;margin-top:18px}
  .cta-pill svg{width:24px;height:24px;fill:#fff}
  .cta-web{font-family:'DM Mono',monospace;font-size:clamp(11px,2.6vw,15px);letter-spacing:1px;color:#d9b88a;margin-top:16px}

  /* persistent corner logo */
  .corner{position:absolute;top:18px;left:20px;z-index:5;display:flex;align-items:center;gap:8px;opacity:0;transition:.6s}
  .corner.show{opacity:1}
  .corner svg{width:34px;height:34px}
  .corner b{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:1px;color:#f4ead7}
  .corner b .r{color:#e7564a}

  /* progress */
  .prog{position:absolute;left:0;bottom:0;height:5px;width:0;background:linear-gradient(90deg,#7fae84,#e7564a);z-index:6}

  /* start + replay overlay */
  .ov{position:absolute;inset:0;z-index:20;background:rgba(16,13,9,.72);backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;padding:24px}
  .ov.hide{display:none}
  .ov h2{font-family:'Anton',sans-serif;color:#f4ead7;font-size:clamp(24px,6vw,44px);text-transform:uppercase;letter-spacing:1px}
  .ov h2 .r{color:#e7564a}
  .ov p{color:#d9b88a;font-family:'DM Mono',monospace;font-size:13px;letter-spacing:1px;max-width:30ch}
  .pbtn{display:inline-flex;align-items:center;gap:10px;background:#e7564a;color:#fff;border:0;font-family:'DM Sans';font-weight:700;font-size:18px;padding:14px 30px;border-radius:50px;cursor:pointer;transition:.2s}
  .pbtn:hover{transform:scale(1.05)}
  .pbtn.alt{background:transparent;border:2px solid #d9b88a;color:#f4ead7;font-size:15px;padding:11px 22px}
  .opt{display:flex;align-items:center;gap:8px;color:#d9b88a;font-size:14px;font-family:'DM Mono'}
  .row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .fs{position:absolute;top:16px;right:18px;z-index:7;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.25);color:#f1e6d0;border-radius:8px;padding:7px 12px;font-size:12px;font-family:'DM Mono';cursor:pointer}
</style>
</head>
<body>
<div class="stage" id="stage">
  <div class="corner" id="corner">
    <svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="11" fill="#0b5c2e"/><path d="M17.4 18C17.4 10.8 20 7.4 24 7.4S30.6 10.8 30.6 18" fill="none" stroke="#ffe9bd" stroke-width="3.4" stroke-linecap="round"/><path d="M11.2 16.6H36.8L34.5 40.8A3.6 3.6 0 0 1 30.9 44H17.1A3.6 3.6 0 0 1 13.5 40.8L11.2 16.6Z" fill="#f79f1f" stroke="#ffe9bd" stroke-width="2.8" stroke-linejoin="round"/><ellipse cx="24" cy="40" rx="9.6" ry="2.7" fill="#ffe9bd"/><ellipse cx="24" cy="39.5" rx="6.2" ry="1.5" fill="#eccf96"/><path d="M24 39.4V28.6" stroke="#0b5c2e" stroke-width="3" stroke-linecap="round"/><path d="M24 32.4C24 26.2 18.9 23.5 13.9 23.8C16.6 28.4 20.3 31.6 24 32.4Z" fill="#0b5c2e"/><path d="M24 36C24 30.4 28.7 27.7 33.9 28C31.2 32.6 27.5 35.3 24 36Z" fill="#17924a"/><circle cx="24" cy="21.4" r="2.7" fill="#e8232f"/></svg>
    <b>KRAFT<span class="r">·</span>VIBE</b>
  </div>

  <button class="fs" onclick="toggleFS()">⛶ Fullscreen</button>
  <div id="scenes"></div>
  <div class="prog" id="prog"></div>

  <div class="ov" id="start">
    <h2>KRAFT<span class="r">·</span>VIBE — INTRO</h2>
    <p>English + தமிழ் promo · 35 sec · play fullscreen and screen-record for WhatsApp / Insta</p>
    <label class="opt"><input type="checkbox" id="voice" checked> 🔊 Voice narration (EN + தமிழ்)</label>
    <button class="pbtn" onclick="run()">▶ Play Intro</button>
  </div>

  <div class="ov hide" id="end">
    <h2>KRAFT<span class="r">·</span>VIBE</h2>
    <p>Branded covers · Plain price · Udumalpet · 7904505226</p>
    <div class="row">
      <button class="pbtn" onclick="run()">↻ Play again</button>
      <button class="pbtn alt" onclick="toggleFS()">⛶ Fullscreen</button>
    </div>
  </div>
</div>

<script>
  const LOGO=`<svg viewBox="0 0 48 48" fill="none" style="width:clamp(120px,26vw,220px);height:auto"><rect width="48" height="48" rx="11" fill="#0b5c2e"/><path d="M17.4 18C17.4 10.8 20 7.4 24 7.4S30.6 10.8 30.6 18" fill="none" stroke="#ffe9bd" stroke-width="3.4" stroke-linecap="round"/><path d="M11.2 16.6H36.8L34.5 40.8A3.6 3.6 0 0 1 30.9 44H17.1A3.6 3.6 0 0 1 13.5 40.8L11.2 16.6Z" fill="#f79f1f" stroke="#ffe9bd" stroke-width="2.8" stroke-linejoin="round"/><ellipse cx="24" cy="40" rx="9.6" ry="2.7" fill="#ffe9bd"/><ellipse cx="24" cy="39.5" rx="6.2" ry="1.5" fill="#eccf96"/><path d="M24 39.4V28.6" stroke="#0b5c2e" stroke-width="3" stroke-linecap="round"/><path d="M24 32.4C24 26.2 18.9 23.5 13.9 23.8C16.6 28.4 20.3 31.6 24 32.4Z" fill="#0b5c2e"/><path d="M24 36C24 30.4 28.7 27.7 33.9 28C31.2 32.6 27.5 35.3 24 36Z" fill="#17924a"/><circle cx="24" cy="21.4" r="2.7" fill="#e8232f"/></svg>`;
  const WA_SVG=`<svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 00-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1012 2zm5.8 14.2c-.2.7-1.4 1.3-2 1.4-.5.1-1.2.1-1.9-.1-.4-.1-1-.3-1.8-.6-3-1.3-5-4.4-5.1-4.6-.2-.2-1.3-1.7-1.3-3.2s.8-2.3 1.1-2.6c.3-.3.6-.4.8-.4h.6c.2 0 .4 0 .7.5l.9 2.1c.1.2.1.4 0 .6l-.4.6c-.2.2-.3.4-.1.7.2.3.9 1.4 1.9 2.3 1.3 1.1 2.3 1.5 2.6 1.6.3.1.5.1.7-.1l.8-1c.2-.3.4-.2.7-.1l2 1c.3.1.5.2.5.4.1.2.1.8-.1 1.4z"/></svg>`;
  const IMG=q=>`https://loremflickr.com/1280/720/${q}/all?lock=`;
  const SCENES=[
    {dur:5000,type:'logo',
      html:`<div class="logo-wrap">${LOGO}<div class="wm">KRAFT<span class="r">·</span>VIBE</div><div class="eyebrow" style="margin-top:6px">MADE LOCAL · UDUMALPET</div></div>`,
      vo:['KRAFT Vibe. Made local in Udumalpet.','கிராஃப்ட் வைப். உடுமலைப்பேட்டையில் தயாரிப்பு.']},
    {dur:5200,bg:IMG('kraft,paper,bag')+'201',
      html:`<div class="inner"><div class="eyebrow">Branded Kraft Covers</div><div class="en">Your name.<br><span class="g">Plain</span> price.</div><div class="ta">பிராண்டட் கிராஃப்ட் கவர்கள் — பிளைன் கவர் விலையில்</div></div>`,
      vo:['Branded kraft covers, at plain cover price.','பிராண்டட் கிராஃப்ட் கவர்கள், பிளைன் கவர் விலையில்.']},
    {dur:4800,bg:IMG('paper,shopping,bag')+'202',
      html:`<div class="inner"><div class="eyebrow">Our Products</div><div class="en">Covers · Bags · Print</div><div class="ta">கவர்கள் · கைப்பைகள் · கஸ்டம் பிரிண்டிங்</div></div>`,
      vo:['Covers, handle bags, and custom printing.','கவர்கள், கைப்பைகள், மற்றும் கஸ்டம் பிரிண்டிங்.']},
    {dur:5500,bg:IMG('printing,press')+'203',
      html:`<div class="inner"><div class="eyebrow">Free Advertising</div><div class="en">Your shop's name<br>on every cover</div><div class="ta">ஒவ்வொரு கவரிலும் உங்கள் கடையின் பெயர் — ஒவ்வொரு விற்பனையிலும் இலவச விளம்பரம்</div></div>`,
      vo:["Your shop's name on every cover. Free advertising on every sale.",'ஒவ்வொரு கவரிலும் உங்கள் கடையின் பெயர். ஒவ்வொரு விற்பனையிலும் இலவச விளம்பரம்.']},
    {dur:5200,bg:IMG('gift,wedding,favor')+'204',
      html:`<div class="inner"><div class="eyebrow">Return Gifts</div><div class="en">Function-ready<br><span class="r">return gift</span> bags</div><div class="ta">திருமணம் & விழாக்களுக்கு ரிட்டர்ன் கிஃப்ட் பைகள்</div></div>`,
      vo:['Custom return gift bags for weddings and functions.','திருமணம் மற்றும் விழாக்களுக்கு ரிட்டர்ன் கிஃப்ட் பைகள்.']},
    {dur:4800,bg:IMG('jute,bag')+'205',
      html:`<div class="inner"><div class="eyebrow">Why KRAFT·Vibe</div><div class="en">Low MOQ · Eco<br>Free delivery</div><div class="ta">குறைந்த அளவு · சுற்றுச்சூழல் நட்பு · இலவச டெலிவரி</div></div>`,
      vo:['Low minimum order, eco friendly, free local delivery.','குறைந்த அளவு ஆர்டர், சுற்றுச்சூழல் நட்பு, இலவச டெலிவரி.']},
    {dur:6500,type:'cta',
      html:`<div class="inner"><div class="eyebrow">Start Today</div><div class="en">Get a <span class="g">FREE</span> sample!</div><div class="ta">இன்றே இலவச சாம்பிள் பெறுங்கள்!</div><div class="cta-pill">${WA_SVG} WhatsApp 7904505226</div><div class="cta-web">harikriz97.github.io/kraftvibe</div></div>`,
      vo:['Get a free sample today. WhatsApp 7904505226.','இன்றே இலவச சாம்பிள் பெறுங்கள். வாட்ஸ்அப் 7904505226.']}
  ];

  const wrap=document.getElementById('scenes');
  SCENES.forEach((s,i)=>{
    const d=document.createElement('div');d.className='scene';d.id='sc'+i;
    d.innerHTML=(s.bg?`<div class="bg" style="background-image:url('${s.bg}')"></div>`:'')+s.html;
    wrap.appendChild(d);
  });
  const N=SCENES.length;
  const EN=[],TA=[];
  for(let i=0;i<N;i++){EN[i]=new Audio('audio/en'+(i+1)+'.mp3');TA[i]=new Audio('audio/ta'+(i+1)+'.mp3');EN[i].preload='auto';TA[i].preload='auto';}
  let timer=null,fb=null;
  const prog=document.getElementById('prog');
  const voiceOn=()=>document.getElementById('voice').checked;
  function stopAudio(){EN.concat(TA).forEach(a=>{try{a.pause();a.currentTime=0;a.onended=null;}catch(e){}});}
  function next(n){ n+1<N ? show(n+1) : endShow(); }

  function show(n){
    clearTimeout(timer); clearTimeout(fb); stopAudio();
    document.querySelectorAll('.scene').forEach(s=>s.classList.remove('on'));
    document.getElementById('sc'+n).classList.add('on');
    document.getElementById('corner').classList.toggle('show', n>0);
    prog.style.width=(((n+1)/N)*100)+'%';
    if(voiceOn()){
      const en=EN[n], ta=TA[n]; let done=false;
      const go=()=>{ if(done)return; done=true; timer=setTimeout(()=>next(n),550); };
      fb=setTimeout(go, SCENES[n].dur+12000);            /* safety if audio fails */
      en.onended=()=>{ try{ ta.currentTime=0; ta.play().catch(()=>{}); }catch(e){} };
      ta.onended=()=>{ clearTimeout(fb); go(); };
      en.currentTime=0;
      en.play().catch(()=>{ clearTimeout(fb); timer=setTimeout(()=>next(n), SCENES[n].dur); });
    } else {
      timer=setTimeout(()=>next(n), SCENES[n].dur);
    }
  }
  function run(){
    clearTimeout(timer); clearTimeout(fb); stopAudio();
    document.getElementById('start').classList.add('hide');
    document.getElementById('end').classList.add('hide');
    prog.style.transition='width .6s ease'; prog.style.width='0';
    show(0);
  }
  function endShow(){ stopAudio(); document.getElementById('end').classList.remove('hide'); }
  function toggleFS(){const e=document.documentElement;if(!document.fullscreenElement){e.requestFullscreen&&e.requestFullscreen();}else{document.exitFullscreen&&document.exitFullscreen();}}
</script>
</body>
</html>
